<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

.hidden{display:none}

.center{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  background:#111827;
  border-radius:12px;
  padding:20px;
  width:95%;
  max-width:1000px;
  margin-bottom:20px;
}

input,select,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#1f2933;
  color:white;
  border:1px solid #374151;
  border-radius:8px;
}

button{
  background:#2563eb;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-top:16px;
}

.metric{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:14px;
}

.metric h3{
  margin:0;
  font-size:14px;
  color:#94a3b8;
}

.metric p{
  font-size:28px;
  margin-top:6px;
}

.placeholder{
  opacity:.35;
}

.issue{
  background:#020617;
  border-radius:8px;
  padding:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card" style="max-width:420px;">
    <h2>Azoul</h2>
    <input id="codeInput" placeholder="A1E or A1M">
    <button onclick="enter()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div class="card" style="max-width:420px;">
    <h3>Anonymous Employee Check‑In</h3>

    <label>What type of issue are you experiencing?</label>
    <select id="category">
      <option value="">Select</option>
      <option>Workload</option>
      <option>Management</option>
      <option>Burnout</option>
      <option>Safety</option>
    </select>

    <button onclick="submitEmployee()">Submit</button>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">

  <!-- VISUAL DASHBOARD HEADER -->
  <div class="card">
    hr-dashboard.png
  </div>

  <!-- METRICS -->
  <div class="card">
    <h3>HR Analytics Dashboard</h3>

    <div class="metric-grid">
      <div class="metric"><h3>Employee Count</h3><p id="empCount" class="placeholder">—</p></div>
      <div class="metric"><h3>Attrition Count</h3><p id="attrCount" class="placeholder">—</p></div>
      <div class="metric"><h3>Attrition Rate</h3><p id="attrRate" class="placeholder">—</p></div>
      <div class="metric"><h3>Active Employees</h3><p id="active" class="placeholder">—</p></div>
      <div class="metric"><h3>Avg Age</h3><p id="age" class="placeholder">—</p></div>
    </div>
  </div>

  <!-- ISSUES -->
  <div class="card">
    <h3>Incoming Concerns</h3>
    <div id="issues" class="placeholder">No data available</div>
  </div>

</div>

<script>
let BUSINESS="A1";

function load(k,d){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

function enter(){
  const c=codeInput.value.trim().toUpperCase();
  entry.classList.add("hidden");
  if(c==="A1E"){employee.classList.remove("hidden");return;}
  if(c==="A1M"){manager.classList.remove("hidden");loadManager();return;}
  alert("Invalid code");
}

function submitEmployee(){
  const data=load("issues",[]);
  if(!category.value){alert("Select a category");return;}
  data.push({category:category.value,time:Date.now()});
  save("issues",data);
  alert("Submitted anonymously");
  category.value="";
}

function loadManager(){
  const issuesData=load("issues",[]);
  if(issuesData.length===0) return;

  // Populate metrics ONLY after data exists
  empCount.textContent="1,233";
  attrCount.textContent=issuesData.length;
  attrRate.textContent=(issuesData.length*2)+"%";
  active.textContent=1233-issuesData.length;
  age.textContent="37";

  document.querySelectorAll(".placeholder").forEach(e=>e.classList.remove("placeholder"));

  issues.innerHTML="";
  issuesData.forEach(i=>{
    const div=document.createElement("div");
    div.className="issue";
    div.textContent=i.category;
    issues.appendChild(div);
  });
}
</script>

</body>
</html>
