<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f9ff;
}

/* ---------- SHARED ---------- */
.hidden { display: none; }
button {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #0077cc;
  color: white;
}
.card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

/* ---------- AZOUL VIEW ---------- */
#azoulView {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
}

#azoulView img {
  width: 180px;
  margin-bottom: 20px;
}

.bubbles {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.bubble {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #e3efff;
  opacity: 0.4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.3s;
}

.bubble img {
  width: 34px;
}

.bubble span {
  font-size: 10px;
  margin-top: 4px;
}

.bubble.active {
  opacity: 1;
  background: #eafff4;
  box-shadow:
    0 0 12px rgba(0,255,150,0.6),
    0 0 24px rgba(0,255,150,0.3);
}

/* ---------- DASHBOARD ---------- */
#dashboardView {
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap: 16px;
}

.kpi {
  font-size: 24px;
  font-weight: bold;
}

.chart {
  height: 100px;
  background: linear-gradient(
    to top,
    rgba(0,180,150,0.35),
    rgba(0,180,150,0.05)
  );
  border-radius: 10px;
  margin-top: 10px;
}

textarea {
  width: 100%;
  height: 80px;
  border-radius: 8px;
  padding: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- ========== AZOUL HOME ========== -->
<div id="azoulView">
  <img src="image.png" alt="Azoul Logo">

  <div class="bubbles">
    <div class="bubble" data-company="bank" onclick="attemptAccess('bank')">
      https://logo.clearbit.com/chase.com
      <span>Bank</span>
    </div>
    <div class="bubble" data-company="retail" onclick="attemptAccess('retail')">
      https://logo.clearbit.com/amazon.com
      <span>Retail</span>
    </div>
    <div class="bubble" data-company="healthcare" onclick="attemptAccess('healthcare')">
      https://logo.clearbit.com/cvs.com
      <span>Healthcare</span>
    </div>
    <div class="bubble" data-company="warehouse" onclick="attemptAccess('warehouse')">
      https://logo.clearbit.com/walmart.com
      <span>Warehouse</span>
    </div>
  </div>
</div>

<!-- ========== DASHBOARD ========== -->
<div id="dashboardView" class="hidden">
  <div class="header">
    <h2 id="dashTitle"></h2>
    <button onclick="goBack()">Back</button>
  </div>

  <div class="dashboard">

    <div class="card">
      <div class="kpi" id="metric1"></div>
      <div>Total Activity</div>
      <div class="chart"></div>
    </div>

    <div class="card">
      <div class="kpi" id="metric2"></div>
      <div>Engagement</div>
      <div class="chart"></div>
    </div>

    <div class="card">
      <h3>Harassment & Misconduct</h3>
      <select>
        <option>Harassment</option>
        <option>Discrimination</option>
        <option>Manager Abuse</option>
        <option>Unsafe Conditions</option>
      </select>
      <textarea placeholder="Optional details (anonymous)"></textarea>
      <button>Submit Anonymously</button>
    </div>

    <div class="card">
      <h3>Why Might You Quit?</h3>
      <label><input type="checkbox"> Burnout</label><br>
      <label><input type="checkbox"> Harassment</label><br>
      <label><input type="checkbox"> Poor Management</label><br>
      <label><input type="checkbox"> Low Pay</label><br>
      <label><input type="checkbox"> Mental Stress</label><br>
      <button>Submit</button>
    </div>

  </div>
</div>

<script>
/* ---------- PASSWORDS ---------- */
const PASSWORDS = {
  bank: "AZOUL-BANK-001",
  retail: "AZOUL-RETAIL-003",
  healthcare: "AZOUL-HEALTH-002",
  warehouse: "AZOUL-WARE-004"
};

let currentCompany = null;

/* ---------- ACCESS ---------- */
function attemptAccess(company) {
  const attempt = prompt("Enter password for " + company.toUpperCase());

  if (attempt === PASSWORDS[company]) {
    currentCompany = company;
    document
      .querySelector(`[data-company="${company}"]`)
      .classList.add("active");
    openDashboard(company);
  } else {
    alert("Incorrect password");
  }
}

/* ---------- DASHBOARD ---------- */
function openDashboard(company) {
  azoulView.classList.add("hidden");
  dashboardView.classList.remove("hidden");

  dashTitle.innerText = "Azoul • " + company.toUpperCase();
  metric1.innerText = Math.floor(Math.random()*9000 + 1000);
  metric2.innerText = Math.floor(Math.random()*500 + 100);
}

/* ---------- BACK ---------- */
function goBack() {
  dashboardView.classList.add("hidden");
  azoulView.classList.remove("hidden");
}
</script>

</body>
</html>
