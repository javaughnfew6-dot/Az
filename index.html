<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --blue:#0a6cff;
  --light:#f5f9ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#dbeafe;
}

body{
  margin:0;
  font-family:Inter,system-ui,sans-serif;
  background:#f5f9ff;
  color:var(--text);
}

.center{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  width:92%;
  max-width:520px;
  box-shadow:0 14px 40px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.hidden{display:none}
.small{font-size:13px;color:var(--muted)}
label{font-size:14px;color:var(--muted);margin-top:12px;display:block}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:15px;
}

button{
  background:var(--blue);
  color:white;
  border:none;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#e5efff;
  color:var(--blue);
}

.metric{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.issue{
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}

.issue-actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}

/* ✅ HR ANALYTICS IMAGE PANEL */
.hr-analytics-panel{
  margin-top:20px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
}

.hr-analytics-panel img{
  width:100%;
  display:block;
}

.hr-analytics-caption{
  padding:12px 16px;
  background:#f8fbff;
  border-top:1px solid var(--border);
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card">
    <h2>Azoul</h2>
    <p class="small">🔒 Anonymous. No logins.</p>
    <input id="codeInput" placeholder="Enter code (e.g. AZ1E)">
    <button onclick="enterApp()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div id="employeeForm" class="card">
    <h3>Anonymous Check‑In</h3>

    <label>How do you feel this week?</label>
    <select id="pulse">
      <option value="1">😔 Overwhelmed</option>
      <option value="2">😐 Okay</option>
      <option value="3">🙂 Good</option>
      <option value="4">😄 Great</option>
    </select><label>How did you feel overall this week?</label>
<select class="pulse-input" data-key="overall">
  <option value="1">😔 Overwhelmed</option>
  <option value="2">😐 Okay</option>
  <option value="3">🙂 Good</option>
  <option value="4">😄 Great</option>
<select class="pulse-input" data-key="workload">
  <option value="1">😔 Too much</option>
  <option value="2">😐 Manageable</option>
  <option value="3">🙂 Comfortable</option>
  <option value="4">😄 Very balanced</option>
<select class="pulse-input" data-key="support">
  <option value="1">😔 Not supported</option>
  <option value="2">😐 Somewhat supported</option>
  <option value="3">🙂 Supported</option>
  <option value="4">😄 Very supported</option>
<label>How was your energy level at work?</label>
<select class="pulse-input" data-key="energy">
  <option value="1">😔 Drained</option>
  <option value="2">😐 Neutral</option>
  <option value="3">🙂 Energized</option>
</select>

    <label>Concern category (optional)</label>
    <select id="category">
      <option value="">None</option>
      <option>Management</option>
      <option>Workload</option>
      <option>Coworkers</option>
      <option>Safety</option>
      <option>Other</option>
    </select>

    <button onclick="submitEmployee()">Submit</button>
    <p class="small">No names. No tracking.</p>
  </div>

  <div id="employeeDone" class="card hidden">
    <h3>✅ Submitted</h3>
    <p class="small">Your feedback was recorded anonymously.</p>
    <button onclick="submitAnother()">Done</button>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">
  <div class="card">
    <h3>Manager Dashboard</h3>

    <div id="summary"></div>

    <!-- ✅ HR ANALYTICS DASHBOARD IMAGE -->
    <div class="hr-analytics-panel">
      <img src="hr-analytics.png" alt="HR Analytics Dashboard">
      <div class="hr-analytics-caption">
        Reference view: common HR analytics metrics (attrition, demographics, engagement).
        Displayed for contextual insight only.
      </div>
    </div>

    <h4 style="margin-top:20px;">Open Issues</h4>
    <div id="issues"></div>
  </div>
</div>

<script>
/* ===== PASSWORDS ===== */
const PASSWORDS = {
  employees: ["AZ1E","AZ1E1","AZ1E2","AZ1E3","AZ1E4","AZ1E5","AZ1E6","AZ1E7","AZ1E8","AZ1E9","AZ1E51"],
  managers:  ["AZ1M","AZ1M1","AZ1M2","AZ1M3","AZ1M4","AZ1M5","AZ1M6","AZ1M7","AZ1M8","AZ1M9","AZ1M51"]
};
const BUSINESS_ID = "A1";

/* ===== STORAGE ===== */
const load=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const week=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")};

/* ===== ENTRY ===== */
function enterApp(){
  const code=codeInput.value.trim().toUpperCase();
  entry.classList.add("hidden");
  employee.classList.add("hidden");
  manager.classList.add("hidden");

  if(PASSWORDS.employees.includes(code)){
    employee.classList.remove("hidden");
    return;
  }
  if(PASSWORDS.managers.includes(code)){
    manager.classList.remove("hidden");
    loadManager();
    return;
  }
  entry.classList.remove("hidden");
  alert("Invalid Azoul code");
}

/* ===== EMPLOYEE ===== */
function submitEmployee(){
  const h=load("health",{});
  const c=load("concerns",[]);
  const w=week();

  h[BUSINESS_ID]??={};
  h[BUSINESS_ID][w]??={p:[]};
  h[BUSINESS_ID][w].p.push(+pulse.value);

  if(category.value){
    c.push({week:w,category:category.value,status:"open"});
  }

  save("health",h);
  save("concerns",c);
  employeeForm.classList.add("hidden");
  employeeDone.classList.remove("hidden");
}

function submitAnother(){
  employeeDone.classList.add("hidden");
  employeeForm.classList.remove("hidden");
}

/* ===== MANAGER ===== */
function loadManager(){
  const h=load("health",{});
  const all=load("concerns",[]);
  const open=all.filter(x=>x.status==="open");
  const w=week();
  const p=h[BUSINESS_ID]?.[w]?.p||[];
  const avg=p.length?(p.reduce((a,b)=>a+b)/p.length).toFixed(2):"N/A";

  summary.innerHTML=`
    <div class="metric"><span>Avg Pulse</span><b>${avg}</b></div>
    <div class="metric"><span>Open Issues</span><b>${open.length}</b></div>
  `;

  issues.innerHTML="";
  open.forEach((x,i)=>{
    const div=document.createElement("div");
    div.className="issue";
    div.innerHTML=`
      <b>${x.category}</b>
      <div class="issue-actions">
        <button class="secondary" onclick="updateIssue(${i},'resolved')">Resolve</button>
        <button class="secondary" onclick="updateIssue(${i},'dismissed')">Dismiss</button>
      </div>
    `;
    issues.appendChild(div);
  });
}

function updateIssue(i,status){
  const all=load("concerns",[]);
  all.filter(x=>x.status==="open")[i].status=status;
  save("concerns",all);
  loadManager();
}
</script>

</body>
</html>
