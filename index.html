<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}
.hidden{display:none}
.center{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:95%;
  max-width:1000px;
  margin-bottom:20px;
}
input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
  border-radius:8px;
  font-size:15px;
}
button{
  background:#2563eb;
  border:none;
  font-weight:600;
  cursor:pointer;
}
.metric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-top:16px;
}
.metric{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:14px;
}
.metric h4{
  margin:0;
  color:#94a3b8;
  font-size:13px;
}
.metric p{
  margin-top:8px;
  font-size:30px;
}
.placeholder{
  opacity:.35;
}
.issue{
  background:#020617;
  border-radius:8px;
  padding:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card" style="max-width:420px;">
    <h2>Azoul</h2>
    <input id="codeInput" placeholder="Enter code (A1E or A1M)">
    <button onclick="enter()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div class="card" style="max-width:420px;">
    <h3>Anonymous Employee Check‑In</h3>

    <label>What issue are you experiencing?</label>
    <select id="category">
      <option value="">Select issue</option>
      <option>Workload</option>
      <option>Management</option>
      <option>Burnout</option>
      <option>Safety</option>
    </select>

    <button onclick="submitEmployee()">Submit</button>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">

  <!-- HR Analytics Image -->
  <div class="card">
    hr-dashboard.png
  </div>

  <!-- Metrics -->
  <div class="card">
    <h3>HR Analytics Dashboard</h3>

    <div class="metric-grid">
      <div class="metric"><h4>Employee Count</h4><p id="empCount" class="placeholder">—</p></div>
      <div class="metric"><h4>Attrition Count</h4><p id="attrCount" class="placeholder">—</p></div>
      <div class="metric"><h4>Attrition Rate</h4><p id="attrRate" class="placeholder">—</p></div>
      <div class="metric"><h4>Active Employees</h4><p id="activeCount" class="placeholder">—</p></div>
      <div class="metric"><h4>Avg Age</h4><p id="avgAge" class="placeholder">—</p></div>
    </div>
  </div>

  <!-- Issues -->
  <div class="card">
    <h3>Incoming Concerns</h3>
    <div id="issues" class="placeholder">No data available</div>
  </div>

</div>

<script>
/* ================= PASSWORDS ================= */

const EMPLOYEE_CODES = ["A1E","A1E1","A1E2","A1E3","A1E4","A1E5"];
const MANAGER_CODES  = ["A1M","A1M1","A1M2","A1M3","A1M4","A1M5"];

/* ================= STORAGE ================= */

function load(k,d){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

/* ================= ROUTING ================= */

function enter(){
  const code = codeInput.value.trim().toUpperCase();
  entry.classList.add("hidden");

  if(EMPLOYEE_CODES.includes(code)){
    employee.classList.remove("hidden");
    return;
  }

  if(MANAGER_CODES.includes(code)){
    manager.classList.remove("hidden");
    loadManager();
    return;
  }

  alert("Invalid code");
  entry.classList.remove("hidden");
}

/* ================= EMPLOYEE ================= */

function submitEmployee(){
  if(!category.value){ alert("Please select an issue"); return; }

  const data = load("issues",[]);
  data.push({ category: category.value });
  save("issues", data);

  alert("Submitted anonymously");
  category.value="";
}

/* ================= MANAGER ================= */

function loadManager(){
  const issues = load("issues",[]);
  if(issues.length === 0) return;

  empCount.textContent = "1,233";
  attrCount.textContent = issues.length;
  attrRate.textContent = (issues.length * 2) + "%";
  activeCount.textContent = 1233 - issues.length;
  avgAge.textContent = "37";

  document.querySelectorAll(".placeholder")
    .forEach(el=>el.classList.remove("placeholder"));

  issuesDiv = document.getElementById("issues");
  issuesDiv.innerHTML = "";

  issues.forEach(i=>{
    const div = document.createElement("div");
    div.className="issue";
    div.textContent = i.category;
    issuesDiv.appendChild(div);
  });
}
</script>

</body>
</html>
``
