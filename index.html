<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --blue:#0a6cff;
  --light:#eaf6ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
}
body {
  margin:0;
  font-family:system-ui, sans-serif;
  background:var(--light);
  color:var(--text);
}
.center {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.card {
  background:var(--white);
  padding:20px;
  border-radius:16px;
  width:92%;
  max-width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  margin-bottom:16px;
}
input, select, textarea, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #dbeafe;
}
button {
  background:var(--blue);
  border:none;
  color:white;
  font-size:16px;
}
.hidden { display:none; }
.small { font-size:14px; color:var(--muted); }
.issue {
  border:1px solid #dbeafe;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
}
.issue button {
  margin-top:6px;
  font-size:14px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card">
    <h2>Azoul 🌊</h2>
    <p class="small">Enter Azoul code</p>
    <input id="codeInput" placeholder="AZ-101-E1 or AZ-101-M1">
    <button onclick="enter()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div class="card">
    <h3>Anonymous Check‑In</h3>

    <label>How do you feel?</label>
    <select id="pulse">
      <option value="1">😔 Stressed</option>
      <option value="2">😐 Neutral</option>
      <option value="3">🙂 Good</option>
    </select>

    <label>Concern category (optional)</label>
    <select id="category">
      <option value="">None</option>
      <option>Management</option>
      <option>Workload</option>
      <option>Coworkers</option>
      <option>Safety</option>
      <option>Other</option>
    </select>

    <textarea id="note" maxlength="280"
      placeholder="Optional (never shown directly to managers)"></textarea>

    <button onclick="submitEmployee()">Submit</button>
    <p class="small">Your identity is never collected.</p>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">
  <div class="card">
    <h3>Team Health Dashboard</h3>
    <div id="summary"></div>

    <h4>Open Issues</h4>
    <div id="issues"></div>
  </div>
</div>

<script>
/* ================== STATE ================== */
let businessId = "";

/* ================== HELPERS ================== */
function nowWeek() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
}
function load(key, def){ return JSON.parse(localStorage.getItem(key) || JSON.stringify(def)); }
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

/* ================== ENTRY ================== */
function enter() {
  let code = codeInput.value.trim();
  if(!code.startsWith("AZ-")) return alert("Invalid code");

  let parts = code.split("-");
  businessId = parts[0] + "-" + parts[1]; // AZ-101

  entry.classList.add("hidden");
  if(code.includes("-E")) employee.classList.remove("hidden");
  else if(code.includes("-M")) loadManager();
  else alert("Invalid role");
}

/* ================== EMPLOYEE ================== */
function submitEmployee() {
  const week = nowWeek();
  let health = load("health", {});
  let concerns = load("concerns", []);

  health[businessId] = health[businessId] || {};
  health[businessId][week] = health[businessId][week] || { pulses:[] };

  health[businessId][week].pulses.push(+pulse.value);

  if(category.value){
    concerns.push({
      businessId, week,
      category:category.value,
      status:"open"
    });
  }

  save("health", health);
  save("concerns", concerns);

  alert("Submitted safely ✅");
  note.value = "";
}

/* ================== MANAGER ================== */
function burnoutScore(pulses, reports){
  if(!pulses.length) return 0;
  let avg = pulses.reduce((a,b)=>a+b) / pulses.length;
  let stressed = pulses.filter(p=>p===1).length / pulses.length;
  let score = 0;
  if(avg <= 1.5) score += 30;
  if(stressed > 0.5) score += 20;
  if(reports > 3) score += 25;
  return Math.min(score,100);
}

function loadManager(){
  manager.classList.remove("hidden");

  const week = nowWeek();
  const health = load("health", {});
  const concerns = load("concerns", []).filter(c=>c.businessId===businessId);

  const pulses = (health[businessId]?.[week]?.pulses || []);
  const openIssues = concerns.filter(c=>c.status==="open");

  const score = burnoutScore(pulses, openIssues.length);
  const level = score>=80?"🚨 Critical":score>=60?"🔥 High":score>=30?"⚠️ Watch":"✅ Stable";

  summary.innerHTML = `
    <p><b>Weekly Avg Pulse:</b> ${pulses.length?(pulses.reduce((a,b)=>a+b)/pulses.length).toFixed(2):"N/A"}</p>
    <p><b>Burnout Score:</b> ${score} — ${level}</p>
  `;

  issues.innerHTML = "";
  openIssues.forEach((c,i)=>{
    const div = document.createElement("div");
    div.className="issue";
    div.innerHTML = `
      <b>${c.category}</b><br>
      <button onclick="resolve(${i})">✅ Resolve</button>
      <button onclick="dismiss(${i})">🗑️ Dismiss</button>
    `;
    issues.appendChild(div);
  });
}

function resolve(i){ updateStatus(i,"resolved"); }
function dismiss(i){ updateStatus(i,"dismissed"); }

function updateStatus(index, status){
  let concerns = load("concerns", []);
  let open = concerns.filter(c=>c.businessId===businessId && c.status==="open");
  open[index].status = status;
  save("concerns", concerns);
  loadManager();
}
</script>

</body>
</html>
