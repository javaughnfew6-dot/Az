<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azoul</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#eaf6ff;
}
.center {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
input, select {
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:1px solid #ccc;
  width:260px;
}
button {
  padding:10px 16px;
  background:#0077cc;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.hidden { display:none; }
.dashboard { padding:20px; }
.card {
  background:white;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
}
.small { color:#666; font-size:14px; }
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <h1>Azoul 🌊</h1>
  <p class="small">Enter your business code</p>
  <input id="codeInput" placeholder="AZ-coffes001-E">
  <button onclick="checkCode()">Enter</button>
</div>

<!-- EMPLOYEE DASH -->
<div id="employeeDash" class="hidden dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="employeeTitle"></h2>

  <!-- PAY -->
  <div class="card">
    <h3>💵 Pay & Labor</h3>
    <input id="hours" placeholder="Hours worked">
    <input id="rate" placeholder="Hourly rate">
    <input id="tax" placeholder="Tax %">
    <button onclick="calcPay()">Calculate</button>
    <div id="payResult"></div>
  </div>

  <!-- EFFORT -->
  <div class="card">
    <h3>⚡ Effort & Stress</h3>
    <input id="customers" placeholder="Customers served">
    <input id="incidents" placeholder="Incidents">
    <button onclick="effort()">Analyze</button>
    <div id="effortResult"></div>
  </div>

  <!-- REPORT -->
  <div class="card">
    <h3>📝 Report</h3>
    <select id="category">
      <option>Customer</option>
      <option>Coworker</option>
      <option>Manager</option>
    </select>
    <button onclick="report()">Submit</button>
  </div>
</div>

<!-- MANAGER DASH -->
<div id="managerDash" class="hidden dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="managerTitle"></h2>

  <!-- SUMMARY -->
  <div class="card">
    <h3>📊 Daily Business Summary</h3>
    <div id="summary"></div>
  </div>
</div>

<script>
/* ================= CORE STATE ================= */
let role = "";
let business = "";
let industry = "Retail"; // default for now
let revenueToday = 632;  // demo value

/* ================= AUTH ================= */
function checkCode(){
  // Format: AZ-coffes001-E
  let code = codeInput.value.trim();
  let match = code.match(/^AZ-([a-zA-Z]+)(\d{3})-(E|M)$/);

  if(!match) return alert("Invalid Azoul code format");

  business = match[1]; // coffes
  role = match[3] === "E" ? "employee" : "manager";

  entry.classList.add("hidden");

  if(role === "employee"){
    employeeTitle.innerText = `${industry} – ${business}`;
    employeeDash.classList.remove("hidden");
  } else {
    managerTitle.innerText = `${industry} – ${business} Insights`;
    managerDash.classList.remove("hidden");
    updateManagerSummary();
  }
}

function goBack(){
  entry.classList.remove("hidden");
  employeeDash.classList.add("hidden");
  managerDash.classList.add("hidden");
}

/* ================= STORAGE ================= */
function getData(){
  return JSON.parse(localStorage.getItem(business) || "[]");
}

function saveData(d){
  localStorage.setItem(business, JSON.stringify(d));
}

/* ================= PAY / LABOR ================= */
function calcPay(){
  let h = +hours.value;
  let r = +rate.value;
  let t = +tax.value;

  let gross = h * r;
  let net = gross * (1 - t / 100);
  let laborPct = (gross / revenueToday) * 100;

  payResult.innerHTML = `
    💰 Net Pay: <b>$${net.toFixed(2)}</b><br>
    👥 Labor Cost: <b>${laborPct.toFixed(1)}%</b>
    ${laborPct <= 35 ? "✅ Healthy" : "⚠️ High"}
  `;
}

/* ================= EFFORT ================= */
function effort(){
  let c = +customers.value || 1;
  let i = +incidents.value;

  let rate = (i / c) * 100;

  effortResult.innerHTML = `
    ⚠️ Incident Rate: <b>${rate.toFixed(1)}%</b><br>
    ${rate > 5 ? "Recommend more staff during rush" : "Operations stable ✅"}
  `;
}

/* ================= REPORT ================= */
function report(){
  let d = getData();
  d.push({ category: category.value, time: Date.now() });
  saveData(d);
  alert("Report submitted");
}

/* ================= MANAGER SUMMARY ================= */
function updateManagerSummary(){
  let d = getData();
  let incidentCount = d.length;
  let laborDemo = ((8 * 18) / revenueToday) * 100;

  summary.innerHTML = `
    📈 Revenue Today: <b>$${revenueToday}</b><br>
    📝 Reports Filed: <b>${incidentCount}</b><br>
    👥 Labor Cost: <b>${laborDemo.toFixed(1)}%</b>
      ${laborDemo <= 35 ? "✅" : "⚠️"}<br>
    ⚠️ Risk Level: <b>${incidentCount > 5 ? "High" : "Low"}</b>
  `;
}
</script>
</body>
</html>
