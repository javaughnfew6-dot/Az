<!-- ================= AZOUL WORKER SHIELD UPGRADE ================= --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azoul</title>
<style>
body { margin:0; font-family:Arial; background:#eaf6ff; }
.center { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
input { padding:10px; margin:5px; border-radius:6px; border:1px solid #ccc; }
button { padding:10px 15px; margin-top:10px; background:#0077cc; color:white; border:none; border-radius:8px; cursor:pointer; }.grid { display:grid; grid-template-columns:repeat(3, 120px); gap:25px; margin-top:30px; } .circle { width:120px; height:120px; border-radius:50%; background:#ccc; display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0.5; cursor:pointer; } .active { background:#00cc88; opacity:1; } .hidden { display:none; } .dashboard { padding:20px; } .card { background:white; padding:15px; margin:10px 0; border-radius:10px; } .result { font-weight:bold; margin-top:10px; } </style>

</head>
<body><!-- ENTRY --><div id="entry" class="center">
  <h1>Azoul 🌊</h1>
  <input id="codeInput" placeholder="Enter Code">
  <button onclick="checkCode()">Unlock</button>  <div class="grid">
    <div id="retail" class="circle" onclick="openDash('retail')">🛒<small>Retail</small></div>
  </div>
</div><!-- RETAIL DASHBOARD --><div id="retailDash" class="hidden dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Worker Shield</h2>  <!-- PAY TRACKER -->  <div class="card">
    <h3>💵 Pay Tracker</h3>
    <input id="hours" placeholder="Hours Worked">
    <input id="rate" placeholder="Hourly Pay">
    <input id="tax" placeholder="Tax %">
    <button onclick="calculatePay()">Calculate Pay</button>
    <div id="payResult" class="result"></div>
  </div>  <!-- EFFORT TRACKER -->  <div class="card">
    <h3>⚡ Effort Tracker</h3>
    <input id="customers" placeholder="Customers Handled">
    <input id="incidents" placeholder="Incidents Faced">
    <button onclick="analyzeEffort()">Analyze Effort</button>
    <div id="effortResult" class="result"></div>
  </div>  <!-- FAIRNESS RESULT -->  <div class="card">
    <h3>📊 Work vs Pay Insight</h3>
    <div id="fairnessResult" class="result"></div>
  </div>
</div><script>
let unlocked = null;

function checkCode() {
  let code = document.getElementById("codeInput").value;
  if (code === "RET789") {
    unlocked = "retail";
    document.getElementById("retail").classList.add("active");
  } else {
    alert("Wrong code");
  }
}

function openDash(type) {
  if (type !== unlocked) return;
  document.getElementById("entry").classList.add("hidden");
  document.getElementById("retailDash").classList.remove("hidden");
}

function goBack() {
  document.getElementById("entry").classList.remove("hidden");
  document.getElementById("retailDash").classList.add("hidden");
}

function calculatePay() {
  let hours = parseFloat(document.getElementById("hours").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let tax = parseFloat(document.getElementById("tax").value) || 0;

  let gross = hours * rate;
  let net = gross - (gross * (tax / 100));

  document.getElementById("payResult").innerText = "Take-home Pay: $" + net.toFixed(2);
}

function analyzeEffort() {
  let customers = parseInt(document.getElementById("customers").value) || 0;
  let incidents = parseInt(document.getElementById("incidents").value) || 0;

  let effortScore = customers + (incidents * 5);

  let result = "";
  if (effortScore > 100) result = "High Effort";
  else if (effortScore > 50) result = "Moderate Effort";
  else result = "Low Effort";

  document.getElementById("effortResult").innerText = result;

  // fairness logic
  let payText = document.getElementById("payResult").innerText;
  if (!payText) return;

  if (effortScore > 100) document.getElementById("fairnessResult").innerText = "⚠️ High effort compared to pay";
  else document.getElementById("fairnessResult").innerText = "✅ Pay seems fair";
}
</script></body>
</html>
