<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f1f8ff;
  font-family: Arial, sans-serif;
}

/* Core */
.core {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 34px;
  background: #0077cc;
  color: white;
  border-radius: 50px;
  font-size: 22px;
  font-weight: bold;
}

/* Bubble Nodes */
.bubble {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: #d9ecff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0.35;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.bubble img {
  width: 48px;
  margin-bottom: 6px;
}

.bubble span {
  font-weight: bold;
}

.bubble.active {
  background: #00bcd4;
  color: white;
  opacity: 1;
  box-shadow: 0 0 25px rgba(0,188,212,0.6);
}

/* Lines */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Controls */
.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 10px;
}

input, button {
  padding: 10px 18px;
  border-radius: 10px;
}

button {
  background: #0077cc;
  color: white;
  border: none;
}

/* Dashboard */
#dashboard {
  display: none;
  padding: 20px;
}

.company-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, 80px);
  gap: 20px;
  margin-top: 20px;
}

.company {
  text-align: center;
}

.company img {
  width: 48px;
}
</style>
</head>

<body>

<!-- WEB -->
<div id="web">
  <div class="core">Azoul 🌊</div>

  <svg>
    <line x1="50%" y1="95" x2="20%" y2="260" stroke="#0077cc" />
    <line x1="50%" y1="95" x2="50%" y2="260" stroke="#0077cc" />
    <line x1="50%" y1="95" x2="80%" y2="260" stroke="#0077cc" />
  </svg>

  <div id="bank" class="bubble industry" style="top:230px; left:12%;" onclick="openDash('bank')">
    <img src="https://cdn-icons-png.flaticon.com/512/483/483361.png">
    <span>Banking</span>
  </div>

  <div id="health" class="bubble industry" style="top:230px; left:42%;" onclick="openDash('health')">
    <img src="https://cdn-icons-png.flaticon.com/512/2967/2967354.png">
    <span>Healthcare</span>
  </div>

  <div id="retail" class="bubble industry" style="top:230px; left:72%;" onclick="openDash('retail')">
    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <span>Retail</span>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="dashTitle"></h2>
  <div class="company-grid" id="companies"></div>
</div>

<!-- ACCESS -->
<div class="controls">
  <input id="codeInput" placeholder="Enter Azoul Access Code">
  <button onclick="unlock()">Access</button>
</div>

<script>
const MASTER_CODE = "AZOUL-ACCESS";

const companies = {
  bank: [
    {name:"Chase", icon:"https://logo.clearbit.com/chase.com"},
    {name:"Bank of America", icon:"https://logo.clearbit.com/bankofamerica.com"}
  ],
  health: [
    {name:"CVS", icon:"https://logo.clearbit.com/cvs.com"},
    {name:"UnitedHealth", icon:"https://logo.clearbit.com/unitedhealthgroup.com"}
  ],
  retail: [
    {name:"Amazon", icon:"https://logo.clearbit.com/amazon.com"},
    {name:"Walmart", icon:"https://logo.clearbit.com/walmart.com"}
  ]
};

function unlock() {
  if (codeInput.value === MASTER_CODE) {
    document.querySelectorAll(".industry")
      .forEach(b => b.classList.add("active"));
  } else {
    alert("Invalid access code");
  }
}

function openDash(type) {
  if (!document.getElementById(type).classList.contains("active")) return;

  web.style.display = "none";
  dashboard.style.display = "block";
  dashTitle.innerText = type.toUpperCase() + " INDUSTRY";

  companies[type].forEach(c => {
    companiesDiv = document.getElementById("companies");
    companiesDiv.innerHTML = "";
    companies[type].forEach(c => {
      companiesDiv.innerHTML += `
        <div class="company">
          <img src="${c.icon}">
          <div>${c.name}</div>
        </div>`;
    });
  });
}

function goBack() {
  dashboard.style.display = "none";
  web.style.display = "block";
  document.getElementById("companies").innerHTML = "";
}
</script>

</body>
</html>
``
