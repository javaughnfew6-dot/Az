  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --blue:#0a6cff;
  --light:#f5f9ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#dbeafe;
}

/* ===== Background ===== */
body{
  margin:0;
  font-family:Inter, system-ui, sans-serif;
  background:
    url("azoul-bg.png") no-repeat center center fixed,
    var(--light);
  background-size:280px;
  color:var(--text);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(245,249,255,0.86);
  pointer-events:none;
  z-index:0;
}

.center{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.card{
  background:var(--white);
  padding:24px;
  border-radius:16px;
  width:92%;
  max-width:420px;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

h2,h3{margin:0 0 12px}

label{
  font-size:14px;
  color:var(--muted);
  display:block;
  margin-top:12px;
}

input,select,textarea,button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:6px;
  font-size:15px;
}

textarea{resize:none}

button{
  background:var(--blue);
  color:white;
  font-weight:600;
  border:none;
  cursor:pointer;
}

.hidden{display:none}
.small{font-size:13px;color:var(--muted)}
.metric{display:flex;justify-content:space-between;margin:6px 0}
.issue{border:1px solid var(--border);padding:12px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<!-- ===== ENTRY ===== -->
<div id="entry" class="center">
  <div class="card">
    <h2>Azoul</h2>
    <p class="small">Enter your Azoul access code</p>
    <input id="codeInput" placeholder="AZ-101-E1 or AZ-101-M1">
    <button onclick="enterApp()">Continue</button>
  </div>
</div>

<!-- ===== EMPLOYEE ===== -->
<div id="employee" class="center hidden">
  <div id="employeeForm" class="card">
    <h3>Anonymous Check‑In</h3>

    <label>Department (optional)</label>
    <select id="department">
      <option value="">Select department</option>
      <option>Sales</option>
      <option>Operations</option>
      <option>Support</option>
      <option>Engineering</option>
      <option>Other</option>
    </select>

    <label>How was this week?</label>
    <select id="pulse">
      <option value="1">Stressed</option>
      <option value="2">Neutral</option>
      <option value="3">Good</option>
    </select>

    <label>Concern category (optional)</label>
    <select id="category">
      <option value="">None</option>
      <option>Management</option>
      <option>Workload</option>
      <option>Coworkers</option>
      <option>Safety</option>
      <option>Other</option>
    </select>

    <textarea maxlength="280"
      placeholder="Optional (never shown directly to managers)"></textarea>

    <button onclick="submitEmployee()">Submit</button>
    <p class="small">No names. No logins. Anonymous by design.</p>
  </div>

  <!-- ✅ Employee confirmation -->
  <div id="employeeDone" class="card hidden">
    <h3>Thank you</h3>
    <p class="small">
      Your check‑in was submitted anonymously.<br>
      It will only be used in aggregated insights.
    </p>
    <button onclick="submitAnother()">Submit Another</button>
  </div>
</div>

<!-- ===== MANAGER ===== -->
<div id="manager" class="center hidden">
  <div class="card">
    <h3>Team Health Overview</h3>

    <div id="summary"></div>

    <h4 style="margin-top:16px;">Open Issues</h4>
    <div id="issues"></div>
  </div>
</div>

<script>
/* ===================================================
   GLOBAL STATE & HELPERS
=================================================== */
let businessId = "";

const load = (k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const save = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

function weekKey(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

/* ===================================================
   ENTRY / ROUTING (FIXED)
=================================================== */
function enterApp(){
  const code = codeInput.value.trim();
  if(!code.startsWith("AZ-")){
    alert("Invalid Azoul code");
    return;
  }

  const p = code.split("-");
  businessId = p[0] + "-" + p[1];

  // ✅ HARD RESET — hide everything
  entry.classList.add("hidden");
  employee.classList.add("hidden");
  manager.classList.add("hidden");

  // ✅ STRICT routing
  if(code.includes("-E")){
    employee.classList.remove("hidden");
    return;
  }

  if(code.includes("-M")){
    manager.classList.remove("hidden");
    loadManager(); // ✅ ONLY called here
    return;
  }

  alert("Invalid role code");
}

/* ===================================================
   EMPLOYEE FLOW (ISOLATED)
=================================================== */
function submitEmployee(){
  const week = weekKey();
  const health = load("health",{});
  const concerns = load("concerns",[]);

  health[businessId] ??= {};
  health[businessId][week] ??= { pulses:[] };
  health[businessId][week].pulses.push(+pulse.value);

  if(category.value){
    concerns.push({
      businessId,
      week,
      category:category.value,
      department:department.value||"Unspecified",
      status:"open"
    });
  }

  save("health",health);
  save("concerns",concerns);

  // ✅ Switch to confirmation screen
  employeeForm.classList.add("hidden");
  employeeDone.classList.remove("hidden");
}

function submitAnother(){
  employeeDone.classList.add("hidden");
  employeeForm.classList.remove("hidden");
}

/* ===================================================
   MANAGER FLOW (SAFE)
=================================================== */
function loadManager(){
  if(manager.classList.contains("hidden")) return; // safety guard

  const week = weekKey();
  const health = load("health",{});
  const concerns = load("concerns",[])
     .filter(c=>c.businessId===businessId && c.status==="open");

  const pulses = health[businessId]?.[week]?.pulses || [];
  const avg = pulses.length
    ? (pulses.reduce((a,b)=>a+b)/pulses.length).toFixed(2)
    : "N/A";

  summary.innerHTML = `
    <div class="metric"><span>Avg Pulse</span><b>${avg}</b></div>
    <div class="metric"><span>Open Issues</span><b>${concerns.length}</b></div>
  `;

  issues.innerHTML = "";
  concerns.forEach((c,i)=>{
    const div=document.createElement("div");
    div.className="issue";
    div.innerHTML=`
      <b>${c.category}</b> — ${c.department}<br>
      <small>Week ${c.week}</small>
    `;
    issues.appendChild(div);
  });
}
</script>

</body>
</html>
``
