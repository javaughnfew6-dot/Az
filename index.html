<!-- ================= AZOUL COMPLETE SYSTEM (ALL-IN-ONE CODE) ================= --><!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azoul</title>
<style>
body { margin:0; font-family:Arial; background:#eaf6ff; }
.center { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
input, textarea, select { padding:10px; margin:5px; border-radius:6px; border:1px solid #ccc; width:250px; }
button { padding:10px 15px; margin-top:10px; background:#0077cc; color:white; border:none; border-radius:8px; cursor:pointer; }
.hidden { display:none; }
.dashboard { padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
canvas { max-width:300px; }
</style>
</head>
<body><div id="entry" class="center">
  <h1>Azoul 🌊</h1>
  <input id="codeInput" placeholder="Enter Code">
  <button onclick="checkCode()">Enter</button>
</div><div id="employeeDash" class="hidden dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="industryTitle"></h2>  <div class="card">
    <h3>💵 Pay</h3>
    <input id="hours" placeholder="Hours">
    <input id="rate" placeholder="Rate">
    <input id="tax" placeholder="Tax %">
    <button onclick="calcPay()">Calculate</button>
    <div id="payResult"></div>
  </div>  <div class="card">
    <h3>⚡ Effort</h3>
    <input id="customers" placeholder="Customers">
    <input id="incidents" placeholder="Incidents">
    <button onclick="effort()">Analyze</button>
    <div id="effortResult"></div>
  </div>  <div class="card">
    <h3>📝 Report</h3>
    <select id="category">
      <option>Customer</option>
      <option>Coworker</option>
      <option>Manager</option>
    </select>
    <button onclick="report()">Submit</button>
  </div>
</div><div id="managerDash" class="hidden dashboard">
  <button onclick="goBack()">⬅ Back</button>
  <h2 id="managerTitle"></h2>  <div class="card">
    <h3>Total Reports</h3>
    <div id="total"></div>
  </div>  <div class="card">
    <h3>Pie Chart</h3>
    <canvas id="pie"></canvas>
  </div>  <div class="card">
    <h3>Bar Graph</h3>
    <canvas id="bar"></canvas>
  </div>
</div><script>
let role="";
let industry="";

function checkCode(){
  let code=codeInput.value.toUpperCase();

  if(code.includes("-E")) role="employee";
  else if(code.includes("-M")) role="manager";
  else return alert("Invalid code");

  if(code.startsWith("RET")) industry="Retail";
  else if(code.startsWith("BNK")) industry="Banking";
  else if(code.startsWith("HLT")) industry="Healthcare";
  else if(code.startsWith("AIR")) industry="Airline";
  else if(code.startsWith("CON")) industry="Construction";
  else if(code.startsWith("OIL")) industry="Oil";
  else if(code.startsWith("RES")) industry="Restaurant";
  else if(code.startsWith("FST")) industry="Fast Food";
  else if(code.startsWith("CAR")) industry="Car Dealership";
  else if(code.startsWith("TRK")) industry="Trucking";
  else return alert("Unknown industry");

  entry.classList.add("hidden");

  if(role==="employee"){
    industryTitle.innerText=industry;
    employeeDash.classList.remove("hidden");
  } else {
    managerTitle.innerText=industry+" Insights";
    managerDash.classList.remove("hidden");
    updateCharts();
  }
}

function goBack(){
  entry.classList.remove("hidden");
  employeeDash.classList.add("hidden");
  managerDash.classList.add("hidden");
}

function getData(){
  return JSON.parse(localStorage.getItem(industry)||"[]");
}

function saveData(d){
  localStorage.setItem(industry, JSON.stringify(d));
}

function calcPay(){
  let net=(hours.value*rate.value)*(1-tax.value/100);
  payResult.innerText="$"+net.toFixed(2);
}

function effort(){
  let score=(+customers.value)+(+incidents.value*5);
  effortResult.innerText=score>100?"High":score>50?"Medium":"Low";
}

function report(){
  let d=getData();
  d.push({cat:category.value});
  saveData(d);
  alert("Report saved");
}

function updateCharts(){
  let d=getData();
  total.innerText=d.length;

  let counts={Customer:0,Coworker:0,Manager:0};
  d.forEach(r=>counts[r.cat]++);

  let colors=["#ff6384","#36a2eb","#ffce56"];

  let p=pie.getContext("2d");
  p.clearRect(0,0,300,300);
  let totalCount=d.length||1,start=0,i=0;
  Object.entries(counts).forEach(([k,v])=>{
    let slice=(v/totalCount)*Math.PI*2;
    p.fillStyle=colors[i];
    p.beginPath();
    p.moveTo(150,150);
    p.arc(150,150,100,start,start+slice);
    p.fill();
    p.fillStyle="#000";
    p.fillText(k,10,20+i*20);
    start+=slice;i++;
  });

  let b=bar.getContext("2d");
  b.clearRect(0,0,300,300);
  i=0;
  Object.entries(counts).forEach(([k,v])=>{
    b.fillStyle=colors[i];
    b.fillRect(50+i*80,300-v*20,40,v*20);
    b.fillStyle="#000";
    b.fillText(k,50+i*80,290);
    i++;
  });
}
</script></body>
</html>
