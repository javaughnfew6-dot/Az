<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ===== GLOBAL STYLE ===== */
body{
  margin:0;
  font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

.hidden{display:none}

.center{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:95%;
  max-width:1000px;
  margin-bottom:20px;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
  border-radius:8px;
  font-size:15px;
}

button{
  background:#2563eb;
  border:none;
  cursor:pointer;
  font-weight:600;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

h2,h3{
  margin:0 0 10px;
}

.metric-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-top:16px;
}

.metric{
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
  padding:14px;
  text-align:left;
}

.metric h4{
  margin:0;
  font-size:13px;
  color:#94a3b8;
}

.metric p{
  font-size:30px;
  margin-top:8px;
}

.placeholder{
  opacity:0.35;
}

.issue{
  background:#020617;
  border-radius:8px;
  padding:10px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- ===== ENTRY ===== -->
<div id="entry" class="center">
  <div class="card" style="max-width:420px;">
    <h2>Azoul</h2>
    <input id="codeInput" placeholder="Enter access code (A1E or A1M)">
    <button onclick="enter()">Continue</button>
  </div>
</div>

<!-- ===== EMPLOYEE ===== -->
<div id="employee" class="center hidden">
  <div class="card" style="max-width:420px;">
    <h3>Anonymous Employee Check‑In</h3>

    <label>What issue are you experiencing?</label>
    <select id="category">
      <option value="">Select an issue</option>
      <option>Workload</option>
      <option>Management</option>
      <option>Burnout</option>
      <option>Safety</option>
    </select>

    <button onclick="submitEmployee()">Submit</button>
  </div>
</div>

<!-- ===== MANAGER ===== -->
<div id="manager" class="center hidden">

  <!-- Visual shell matching HR dashboard -->
  <div class="card">
    <img src="hr-dashboard.png" style="width:100%;border-radius:10px;">
  </div>

  <!-- Metrics -->
  <div class="card">
    <h3>HR Analytics Dashboard</h3>

    <div class="metric-grid">
      <div class="metric">
        <h4>Employee Count</h4>
        <p id="empCount" class="placeholder">—</p>
      </div>
      <div class="metric">
        <h4>Attrition Count</h4>
        <p id="attrCount" class="placeholder">—</p>
      </div>
      <div class="metric">
        <h4>Attrition Rate</h4>
        <p id="attrRate" class="placeholder">—</p>
      </div>
      <div class="metric">
        <h4>Active Employees</h4>
        <p id="activeCount" class="placeholder">—</p>
      </div>
      <div class="metric">
        <h4>Avg. Age</h4>
        <p id="avgAge" class="placeholder">—</p>
      </div>
    </div>
  </div>

  <!-- Issues -->
  <div class="card">
    <h3>Incoming Concerns</h3>
    <div id="issues" class="placeholder">No data available</div>
  </div>

</div>

<script>
/* ================= DATA ================= */
function load(key,def){return JSON.parse(localStorage.getItem(key)||JSON.stringify(def))}
function save(key,val){localStorage.setItem(key,JSON.stringify(val))}

/* ================= ROUTING ================= */
function enter(){
  const code = codeInput.value.trim().toUpperCase();
  entry.classList.add("hidden");

  if(code==="A1E"){
    employee.classList.remove("hidden");
    return;
  }
  if(code==="A1M"){
    manager.classList.remove("hidden");
    loadManager();
    return;
  }

  alert("Invalid code");
  entry.classList.remove("hidden");
}

/* ================= EMPLOYEE ================= */
function submitEmployee(){
  if(!category.value){
    alert("Please select an issue");
    return;
  }
  const data = load("issues",[]);
  data.push({category:category.value});
  save("issues",data);
  alert("Submitted anonymously");
  category.value="";
}

/* ================= MANAGER ================= */
function loadManager(){
  const issues = load("issues",[]);
  if(issues.length===0) return;

  // Populate metrics only after data exists
  empCount.textContent = "1,233";
  attrCount.textContent = issues.length;
  attrRate.textContent = (issues.length * 2) + "%";
  activeCount.textContent = 1233 - issues.length;
  avgAge.textContent = "37";

  document.querySelectorAll(".placeholder")
    .forEach(el=>el.classList.remove("placeholder"));

  issuesDiv.innerHTML = "";
  issues.forEach(i=>{
    const div=document.createElement("div");
    div.className="issue";
    div.textContent=i.category;
    issues.appendChild(div);
  });
}
</script>

</body>
</html>
``
