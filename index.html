<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --blue:#0a6cff;
  --light:#f5f9ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#dbeafe;
}

body{
  margin:0;
  font-family:Inter, system-ui, sans-serif;
  background:#f5f9ff;
  color:var(--text);
}

.center{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  width:92%;
  max-width:420px;
  box-shadow:0 12px 32px rgba(0,0,0,.08);
  margin-bottom:20px;
}

.hidden{display:none}
.small{font-size:13px;color:var(--muted)}
label{font-size:14px;color:var(--muted);margin-top:12px;display:block}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  font-size:15px;
  border:1px solid var(--border);
  border-radius:10px;
}

button{
  background:var(--blue);
  color:white;
  border:none;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#e5efff;
  color:var(--blue);
}

.metric{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.issue{
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-top:10px;
}

.issue-actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card">
    <h2>Azoul</h2>
    <p class="small">🔒 Anonymous. No logins.</p>
    <input id="codeInput" placeholder="Enter code (e.g. A1E)">
    <button onclick="enterApp()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div id="employeeForm" class="card">
    <h3>Anonymous Check‑In</h3>

    <label>How do you feel this week?</label>
    <select id="pulse">
      <option value="1">😔 Overwhelmed</option>
      <option value="2">😐 Okay</option>
      <option value="3">🙂 Good</option>
      <option value="4">😄 Great</option>
    </select>

    <label>Concern category (optional)</label>
    <select id="category">
      <option value="">None</option>
      <option>Management</option>
      <option>Workload</option>
      <option>Coworkers</option>
      <option>Safety</option>
      <option>Other</option>
    </select>

    <button onclick="submitEmployee()">Submit</button>
    <p class="small">No names. No tracking.</p>
  </div>

  <div id="employeeDone" class="card hidden">
    <h3>✅ Submitted</h3>
    <p class="small">Your feedback was recorded anonymously.</p>
    <button onclick="submitAnother()">Done</button>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">
  <div class="card">
    <h3>Manager Dashboard</h3>

    <div id="summary"></div>

    <h4>Open Issues</h4>
    <div id="issues"></div>
  </div>
</div>

<script>
/* ================= PASSWORDS ================= */

const PASSWORDS = {
  employees: ["A1E","A1E1","A1E2","A1E3","A1E4","A1E5"],
  managers:  ["A1M","A1M1","A1M2","A1M3","A1M4","A1M5"]
};

const BUSINESS_ID = "A1";

/* ================= STORAGE ================= */

const load = (k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const save = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

function currentWeek(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

/* ================= ENTRY ================= */

function enterApp(){
  const code = codeInput.value.trim().toUpperCase();

  entry.classList.add("hidden");
  employee.classList.add("hidden");
  manager.classList.add("hidden");

  if (PASSWORDS.employees.includes(code)) {
    employee.classList.remove("hidden");
    return;
  }

  if (PASSWORDS.managers.includes(code)) {
    manager.classList.remove("hidden");
    loadManager();
    return;
  }

  entry.classList.remove("hidden");
  alert("Invalid Azoul code");
}

/* ================= EMPLOYEE ================= */

function submitEmployee(){
  const week = currentWeek();
  const health = load("health",{});
  const concerns = load("concerns",[]);

  health[BUSINESS_ID] ??= {};
  health[BUSINESS_ID][week] ??= { pulses:[] };
  health[BUSINESS_ID][week].pulses.push(+pulse.value);

  if (category.value) {
    concerns.push({
      week,
      category: category.value,
      status: "open"
    });
  }

  save("health",health);
  save("concerns",concerns);

  employeeForm.classList.add("hidden");
  employeeDone.classList.remove("hidden");
}

function submitAnother(){
  employeeDone.classList.add("hidden");
  employeeForm.classList.remove("hidden");
}

/* ================= MANAGER ================= */

function loadManager(){
  const week = currentWeek();
  const health = load("health",{});
  const allConcerns = load("concerns",[]);
  const openConcerns = allConcerns.filter(c => c.status === "open");

  const pulses = health[BUSINESS_ID]?.[week]?.pulses || [];
  const avg = pulses.length
    ? (pulses.reduce((a,b)=>a+b)/pulses.length).toFixed(2)
    : "N/A";

  summary.innerHTML = `
    <div class="metric"><span>Avg Pulse</span><b>${avg}</b></div>
    <div class="metric"><span>Open Issues</span><b>${openConcerns.length}</b></div>
  `;

  issues.innerHTML = "";

  openConcerns.forEach((c,index)=>{
    const div=document.createElement("div");
    div.className="issue";
    div.innerHTML=`
      <b>${c.category}</b>
      <div class="issue-actions">
        <button class="secondary" onclick="resolveIssue(${index})">Resolve</button>
        <button class="secondary" onclick="dismissIssue(${index})">Dismiss</button>
      </div>
    `;
    issues.appendChild(div);
  });
}

function resolveIssue(index){
  updateIssueStatus(index,"resolved");
}

function dismissIssue(index){
  updateIssueStatus(index,"dismissed");
}

function updateIssueStatus(index,status){
  let allConcerns = load("concerns",[]);
  let openConcerns = allConcerns.filter(c => c.status === "open");

  openConcerns[index].status = status;

  save("concerns",allConcerns);
  loadManager();
}
</script>

</body>
</html>
