<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azoul</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --blue:#0a6cff;
  --light:#f5f9ff;
  --white:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --border:#dbeafe;
  --warn:#f59e0b;
  --danger:#dc2626;
}

/* ✅ BACKGROUND WITH AZOUL LOGO */
body{
  margin:0;
  font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background:
    url("azoul-bg.png") no-repeat center center fixed,
    var(--light);
  background-size: 420px;
  color:var(--text);
}

/* ✅ SOFT OVERLAY FOR READABILITY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(245,249,255,0.93);
  pointer-events:none;
  z-index:0;
}

.center{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ✅ CARDS FLOAT ABOVE BACKGROUND */
.card{
  background:var(--white);
  padding:24px;
  border-radius:16px;
  width:92%;
  max-width:560px;
  box-shadow:0 14px 40px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

h2,h3,h4{
  margin:0 0 12px;
  font-weight:600;
}

label{
  font-size:14px;
  color:var(--muted);
  display:block;
  margin-top:12px;
}

input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
}

textarea{resize:none}

button{
  background:var(--blue);
  color:white;
  border:none;
  font-weight:600;
  cursor:pointer;
}

button.secondary{
  background:#e5efff;
  color:var(--blue);
}

.hidden{display:none}
.small{font-size:13px;color:var(--muted)}

.metric{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.issue{
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  margin-top:10px;
}

.issue-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

canvas{
  margin:20px auto;
  display:block;
}

/* ✅ ALERT BANNERS */
.banner{
  padding:14px;
  border-radius:12px;
  margin-bottom:16px;
  font-weight:600;
}

.banner.ok{
  background:#ecfeff;
  color:#0369a1;
}

.banner.warn{
  background:#fff7ed;
  color:var(--warn);
}

.banner.danger{
  background:#fee2e2;
  color:var(--danger);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="center">
  <div class="card">
    <h2>Azoul</h2>
    <p class="small">Enter your Azoul access code</p>
    <input id="codeInput" placeholder="AZ-101-E1 or AZ-101-M1">
    <button onclick="enter()">Continue</button>
  </div>
</div>

<!-- EMPLOYEE -->
<div id="employee" class="center hidden">
  <div class="card">
    <h3>Anonymous Check‑In</h3>

    <label>Department (optional)</label>
    <select id="department">
      <option value="">Select department</option>
      <option>Sales</option>
      <option>Operations</option>
      <option>Support</option>
      <option>Engineering</option>
      <option>Other</option>
    </select>

    <label>How was this week?</label>
    <select id="pulse">
      <option value="1">Stressed</option>
      <option value="2">Neutral</option>
      <option value="3">Good</option>
    </select>

    <label>Concern category (optional)</label>
    <select id="category">
      <option value="">None</option>
      <option>Management</option>
      <option>Workload</option>
      <option>Coworkers</option>
      <option>Safety</option>
      <option>Other</option>
    </select>

    <textarea id="note" maxlength="280"
      placeholder="Optional (never shown directly to managers)"></textarea>

    <button onclick="submitEmployee()">Submit</button>
    <p class="small">No names. No logins. Anonymous by design.</p>
  </div>
</div>

<!-- MANAGER -->
<div id="manager" class="center hidden">
  <div class="card">
    <h3>Team Health Overview</h3>
    <div id="alert"></div>
    <div id="summary"></div>

    <h4>Pulse Trend</h4>
    <canvas id="lineChart" width="320" height="160"></canvas>

    <h4>Issues by Category</h4>
    <canvas id="pieChart" width="240" height="240"></canvas>

    <h4>Departments with Issues</h4>
    <canvas id="deptChart" width="240" height="240"></canvas>

    <h4>Open Issues</h4>
    <div id="issues"></div>
  </div>
</div>

<script>
let businessId="";

const load=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

function nowWeek(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function enter(){
  const code=codeInput.value.trim();
  if(!code.startsWith("AZ-")) return alert("Invalid code");

  const p=code.split("-");
  businessId=p[0]+"-"+p[1];

  entry.classList.add("hidden");
  employee.classList.add("hidden");
  manager.classList.add("hidden");

  if(code.includes("-E")){
    employee.classList.remove("hidden");
  }else if(code.includes("-M")){
    manager.classList.remove("hidden");
    loadManager();
  }
}

function submitEmployee(){
  const week=nowWeek();
  const health=load("health",{});
  const concerns=load("concerns",[]);

  health[businessId]??={};
  health[businessId][week]??={pulses:[]};
  health[businessId][week].pulses.push(+pulse.value);

  if(category.value){
    concerns.push({
      businessId,week,
      category:category.value,
      department:department.value||"Unspecified",
      status:"open"
    });
  }

  save("health",health);
  save("concerns",concerns);
  alert("Submitted anonymously ✅");
}
</script>

</body>
</html>
